<!-- Bootstrap navbar - navbar-dark bg-dark gives it a dark colour -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">

    <!-- the app name on the left side of navbar -->
    <a class="navbar-brand" href="#">UserApp</a>

    <!-- list of navigation links -->
    <ul class="navbar-nav">
      <li class="nav-item">
        <!-- routerLink="/" points to the home route - shows displaydetails component -->
        <!-- routerLinkActive adds 'active' class when you are on this route -->
        <a class="nav-link" routerLink="/" routerLinkActive="active">Home</a>
      </li>
      <li class="nav-item">
        <!-- routerLink="/about" points to the about route - shows about component -->
        <a class="nav-link" routerLink="/about" routerLinkActive="active">About</a>
      </li>
    </ul>

  </div>
</nav>

<!-- router-outlet is where the component for the current route gets displayed -->
<!-- visiting / shows displaydetails, visiting /about shows about -->
<router-outlet />
